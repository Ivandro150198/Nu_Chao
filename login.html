<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar - Nu Chao</title>
  <link rel="icon" type="image/png" href="assets/logo-nc.png">
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-card { width: 100%; max-width: 380px; background: var(--bg-elevated, #fff); border-radius: var(--radius-lg, 24px); padding: 28px; border: 1px solid rgba(46,125,50,0.3); box-shadow: 0 18px 45px rgba(46,125,50,0.15); }
    .login-card h1 { font-size: 22px; margin-bottom: 8px; color: var(--text, #1b5e20); }
    .login-card p { color: var(--muted, #4a6b4a); font-size: 13px; margin-bottom: 20px; }
    .login-form label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .login-form input { width: 100%; padding: 10px 14px; border-radius: 999px; border: 1px solid rgba(46,125,50,0.35); background: #fff; color: var(--text, #1b5e20); font-size: 14px; margin-bottom: 14px; }
    .login-form button { width: 100%; padding: 12px; border-radius: 999px; background: linear-gradient(135deg, #43a047, #2e7d32); color: #fff; font-weight: 600; border: none; cursor: pointer; font-size: 14px; }
    .login-form button:hover { opacity: 0.95; }
    .login-error { color: #c62828; font-size: 12px; margin-top: 8px; }
    .login-footer { margin-top: 16px; text-align: center; }
    .login-footer a { color: var(--accent, #2e7d32); font-size: 13px; }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1>Entrar</h1>
      <p>Faça login para finalizar compras e aceder à área administrativa.</p>
      <form class="login-form" id="loginForm">
        <label for="user">Utilizador</label>
        <input type="text" id="user" name="user" autocomplete="username" required placeholder="admin">
        <label for="password">Palavra-passe</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="••••••••">
        <button type="submit">Entrar</button>
        <p class="login-error" id="loginError" role="alert" style="display:none;"></p>
      </form>
      <div class="login-footer">
        <a href="registar.html">Ainda não tem conta? Registe-se</a><br>
        <a href="index.html">Voltar à loja</a>
      </div>
    </div>
  </div>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      if (getSession()) {
        const params = new URLSearchParams(window.location.search);
        const returnTo = params.get("return");
        window.location.href = returnTo || "index.html";
        return;
      }
      document.getElementById("loginForm").addEventListener("submit", function (e) {
        e.preventDefault();
        var user = document.getElementById("user").value;
        var pass = document.getElementById("password").value;
        var errEl = document.getElementById("loginError");
        if (login(user, pass)) {
          var params = new URLSearchParams(window.location.search);
          var returnTo = params.get("return");
          window.location.href = returnTo || "index.html";
        } else {
          errEl.textContent = "Utilizador ou palavra-passe incorretos.";
          errEl.style.display = "block";
        }
      });
    })();
  </script>
</body>
</html>
